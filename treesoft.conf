<VirtualHost *:80>
    ServerName treesoft.cl
    ServerAlias www.treesoft.cl

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName treesoft.cl
    ServerAlias www.treesoft.cl

    # SSL (Let's Encrypt - adjust paths as needed)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/treesoft.cl/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/treesoft.cl/privkey.pem

    # Proxy to Node.js
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Gzip (Node handles this too, but belt-and-suspenders)
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
    </IfModule>

    # Cache static assets
    <LocationMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$">
        Header set Cache-Control "public, max-age=86400"
    </LocationMatch>

    ErrorLog ${APACHE_LOG_DIR}/treesoft-error.log
    CustomLog ${APACHE_LOG_DIR}/treesoft-access.log combined
</VirtualHost>
